# Note: vendor/ directory (StreamDock SDK) is manually managed.
# Dependabot cannot track it. See vendor/VENDOR.md for update instructions.

version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    reviewers:
      - "@javi"
    labels:
      - "dependencies"
